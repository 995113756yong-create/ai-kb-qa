<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 知识库问答</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f5f5f5; height: 100vh; display: flex; flex-direction: column; }

        /* Header */
        .header { background: #fff; padding: 16px 24px; border-bottom: 1px solid #e0e0e0; display: flex; align-items: center; justify-content: space-between; }
        .header h1 { font-size: 18px; color: #333; }
        .upload-btn { background: #2563eb; color: #fff; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 14px; }
        .upload-btn:hover { background: #1d4ed8; }
        .upload-btn:disabled { background: #93c5fd; cursor: not-allowed; }

        /* Chat area */
        .chat-area { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 16px; }
        .msg { max-width: 70%; padding: 12px 16px; border-radius: 12px; font-size: 14px; line-height: 1.6; }
        .msg-user { align-self: flex-end; background: #2563eb; color: #fff; }
        .msg-bot { align-self: flex-start; background: #fff; color: #333; border: 1px solid #e0e0e0; }
        .msg-system { align-self: center; background: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; font-size: 13px; }

        /* Input area */
        .input-area { background: #fff; padding: 16px 24px; border-top: 1px solid #e0e0e0; display: flex; gap: 12px; }
        .input-area input { flex: 1; padding: 12px 16px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 14px; outline: none; }
        .input-area input:focus { border-color: #2563eb; }
        .send-btn { background: #2563eb; color: #fff; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; font-size: 14px; }
        .send-btn:hover { background: #1d4ed8; }
        .send-btn:disabled { background: #93c5fd; cursor: not-allowed; }
    </style>
</head>
<body>

    <div class="header">
        <h1>AI 知识库问答系统</h1>
        <div>
            <input type="file" id="fileInput" accept=".txt,.pdf,.md" style="display:none">
            <button class="upload-btn" id="uploadBtn">上传文档</button>
        </div>
    </div>

    <div class="chat-area" id="chatArea">
        <div class="msg msg-system">上传文档后，即可开始提问</div>
    </div>

    <div class="input-area">
        <input type="text" id="questionInput" placeholder="输入你的问题..." disabled>
        <button class="send-btn" id="sendBtn" disabled>发送</button>
    </div>

    <script>
        const API_BASE = "http://127.0.0.1:8000";
        const chatArea = document.getElementById("chatArea");
        const questionInput = document.getElementById("questionInput");
        const sendBtn = document.getElementById("sendBtn");
        const uploadBtn = document.getElementById("uploadBtn");
        const fileInput = document.getElementById("fileInput");
        let docReady = false;

        // Add message to chat
        function addMsg(text, type) {
            const div = document.createElement("div");
            div.className = "msg msg-" + type;
            div.textContent = text;
            chatArea.appendChild(div);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        // Upload
        uploadBtn.onclick = () => fileInput.click();
        fileInput.onchange = async () => {
            const file = fileInput.files[0];
            if (!file) return;
            uploadBtn.disabled = true;
            uploadBtn.textContent = "上传中...";
            const formData = new FormData();
            formData.append("file", file);
            try {
                const resp = await fetch(API_BASE + "/upload", { method: "POST", body: formData });
                const data = await resp.json();
                if (data.status === "ok") {
                    addMsg("文档已上传: " + data.filename + " (" + data.chunks + " chunks)", "system");
                    docReady = true;
                    questionInput.disabled = false;
                    sendBtn.disabled = false;
                } else {
                    addMsg("上传失败: " + (data.detail || "unknown error"), "system");
                }
            } catch (e) {
                addMsg("上传失败: " + e.message, "system");
            }
            uploadBtn.disabled = false;
            uploadBtn.textContent = "上传文档";
            fileInput.value = "";
        };

        // Ask
        async function sendQuestion() {
            const q = questionInput.value.trim();
            if (!q || !docReady) return;
            addMsg(q, "user");
            questionInput.value = "";
            sendBtn.disabled = true;
            sendBtn.textContent = "思考中...";
            addMsg("正在检索文档...", "system");
            try {
                const resp = await fetch(API_BASE + "/ask", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ question: q })
                });
                const data = await resp.json();
                chatArea.lastChild.remove();
                if (data.status === "ok") {
                    addMsg(data.answer, "bot");
                } else {
                    addMsg("出错了: " + (data.detail || "unknown"), "system");
                }
            } catch (e) {
                chatArea.lastChild.remove();
                addMsg("请求失败: " + e.message, "system");
            }
            sendBtn.disabled = false;
            sendBtn.textContent = "发送";
            questionInput.focus();
        }

        sendBtn.onclick = sendQuestion;
        questionInput.onkeydown = (e) => { if (e.key === "Enter") sendQuestion(); };
    </script>
</body>
</html>
