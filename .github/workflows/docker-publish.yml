name: Build, Push and Deploy

on:
  push:
    branches: [main]

env:
  IMAGE_NAME: ai-kb-qa

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Install kubectl
        run: |
          curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/

      - name: Configure kubectl with Sealos kubeconfig
        env:
          KUBECONFIG_CONTENT: ${{ secrets.SEALOS_KUBECONFIG }}
        run: |
          mkdir -p $HOME/.kube
          printf '%s' "$KUBECONFIG_CONTENT" > $HOME/.kube/config
          chmod 600 $HOME/.kube/config
          echo "=== Debug: kubeconfig line count ==="
          wc -l $HOME/.kube/config
          echo "=== Debug: first 5 lines ==="
          head -5 $HOME/.kube/config
          echo "=== Debug: contexts section ==="
          grep -A2 "contexts:" $HOME/.kube/config || echo "NO contexts FOUND"
          echo "=== Debug: current-context ==="
          grep "current-context:" $HOME/.kube/config || echo "NO current-context FOUND"

      - name: Restart deployment on Sealos
        run: |
          kubectl get deployments -n ns-p93832nn
          kubectl rollout restart deployment -n ns-p93832nn --all
          kubectl rollout status deployment -n ns-p93832nn --all --timeout=180s
